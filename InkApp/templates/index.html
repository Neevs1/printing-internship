                    <select id="Paper_type">

                </div>

                <button onclick="getPrediction()" class="bg-cyan-600 hover:bg-cyan-500 py-4 rounded-lg font-bold mt-6 transition-all">
                    RUN ML PREDICTION

                <span class="text-slate-400 text-sm mb-4 block">VISUAL KEY ADJUSTMENT</span>
                <div class="h-12 bg-slate-900 rounded-full overflow-hidden border border-slate-700 relative">

                </div>
            </div>
        </div>

    <script>
        async function getPrediction() {
    const btn = document.querySelector('button');
    btn.innerText = "CALCULATING...";

    // This object MUST match the keys in your app.py exactly
    const payload = {
        Press_ID: document.getElementById('Press_ID').value,
        Job_Number: document.getElementById('Job_Number').value,
        Paper_type: document.getElementById('Paper_type').value,
        Zone_number: document.getElementById('Zone_number').value,
        Color: document.getElementById('Color').value,
        Ink_key_zero_setting: document.getElementById('Ink_key_zero_setting').value,
        Delta_E_before: document.getElementById('Delta_E_before').value,
        initial_density: document.getElementById('initial_density').value,
        final_density: document.getElementById('final_density').value,
        initial_ink_key_setting: document.getElementById('initial_ink_key_setting').value,
        final_ink_key_setting: document.getElementById('final_ink_key_setting').value
    };

    try {
        const response = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if(result.status === "success") {
            const de = result.prediction;
            // Update the big number
            const display = document.getElementById('resultVal');
            display.innerText = de;
            
            // Color logic: Green if Delta E is low, Yellow/Red if high
            display.className = "text-6xl font-mono font-bold " + (de < 2.5 ? "text-green-400" : "text-yellow-500");
            
            // Update the bar based on the predicted value or key setting
            const keySetting = payload.final_ink_key_setting;
            document.getElementById('resultBar').style.width = keySetting + "%";
            document.getElementById('barLabel').innerText = "FINAL KEY OPENING: " + keySetting + "%";
        } else {
            console.error("Backend Error:", result.message);
            alert("Model Error: " + result.message);
        }
    } catch (err) {
        console.error("Network Error:", err);
    } finally {
        btn.innerText = "RUN ML PREDICTION";
    }
}
    </script>
</body>
</html>

                </tr>
                <tr>
                    <td class="p-3 text-xs font-bold sticky left-0 bg-[#1e293b] border-r border-slate-700">INIT KEY%</td>
                    <script>for(let i=1; i<=32; i++) document.write(`<td class="zone-col"><input type="number" class="key-in" data-z="${i}" value="25"></td>`);</script>
                </tr>
                <tr class="bg-black/20">
                    <td class="p-3 text-xs font-bold sticky left-0 bg-[#1e293b] border-r border-slate-700">PREDICTION</td>
                    <script>for(let i=1; i<=32; i++) document.write(`
                        <td class="zone-col">
                            <div class="bar-container">
                                <div id="bar-${i}" class="key-bar" style="height: 0%"></div>
                                <span id="txt-${i}" class="absolute top-2 text-[10px] font-bold">--</span>
                            </div>
                        </td>`);</script>
                </tr>
            </table>
        </div>
    </div>

    <script>
        async function calculateAll() {
            const zones = [];
            // MATCHING THE CORRECT IDs FROM HTML
            const job = document.getElementById('job_no').value;
            const paper = document.getElementById('global_paper').value;
            const color = document.getElementById('global_color').value;

            document.querySelectorAll('.de-in').forEach(input => {
                const z = input.dataset.z;
                const de = input.value;
                const ik = document.querySelector(`.key-in[data-z="${z}"]`).value;
                
                if(de && de !== "") { 
                    zones.push({
                        zone_no: z,
                        de_before: de,
                        init_key: ik,
                        job_number: job,
                        paper_type: paper,
                        color: color
                    });
                }
            });

            if(zones.length === 0) return alert("Please enter ΔE values for the zones you want to predict.");

            try {
                const response = await fetch('/predict_all', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ zones: zones })
                });

                const result = await response.json();
                if(result.status === "success") {
                    result.results.forEach(r => {
                        const bar = document.getElementById(`bar-${r.zone_no}`);
                        const txt = document.getElementById(`txt-${r.zone_no}`);
                        if(bar) bar.style.height = r.predicted_key + "%";
                        if(txt) txt.innerText = r.predicted_key + "%";
                    });
                } else {
                    alert("Model Error: " + result.message);
                }
            } catch (err) {
                alert("Connection failed. Ensure app.py is running.");
            }
        }

        function updateColors() {
            const color = document.getElementById('global_color').value;
            const colors = {'Cyan':'#06b6d4', 'Magenta':'#d946ef', 'Yellow':'#facc15', 'Black':'#64748b'};
            document.querySelectorAll('.key-bar').forEach(bar => {
                bar.style.backgroundColor = colors[color];
            });
            document.getElementById('global_color').style.color = colors[color];
        }
    </script>
</body>
</html>
