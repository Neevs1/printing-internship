<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InkKey Pro | Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .console-container::-webkit-scrollbar { height: 10px; }
        .console-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }
        .zone-cell { min-width: 95px; border-right: 1px solid #1e293b; padding: 12px; }
        input { background: #020617; border: 1px solid #334155; color: #22d3ee; padding: 6px; border-radius: 4px; width: 100%; text-align: center; }
        .result-box { height: 180px; background: #020617; border-radius: 8px; position: relative; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        .key-bar { width: 100%; background: linear-gradient(to top, #0891b2, #22d3ee); transition: height 0.6s ease-out; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[99%] mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <h1 class="text-xl font-bold tracking-tight">INKKEY <span class="text-cyan-400">CONSOLE</span></h1>
            <div class="flex gap-3">
                <select id="global_color" onchange="updateColors()" class="bg-slate-800 px-4 py-2 rounded text-cyan-400 font-bold outline-none">
                    <option value="Cyan">Cyan</option><option value="Magenta">Magenta</option>
                    <option value="Yellow">Yellow</option><option value="Black">Black</option>
                </select>
                <button onclick="calculateAll()" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded font-bold transition-all">PREDICT PROFILE</button>
                <button onclick="clearConsole()" class="bg-slate-700 hover:bg-red-900 px-4 py-2 rounded text-xs transition-all">CLEAR ALL</button>
                <a href="/settings" class="bg-slate-800 p-2 rounded">⚙️</a>
            </div>
        </header>

        <div class="console-container overflow-x-auto bg-[#1e293b] rounded-xl border border-slate-700">
            <table class="w-full border-collapse">
                <tr class="bg-slate-900/50 text-[10px] text-slate-500">
                    <th class="p-3 sticky left-0 bg-[#1e293b] border-r border-slate-700 z-10">Zone</th>
                    <script>for(let i=1; i<=32; i++) document.write(`<th class="zone-cell text-center">${i}</th>`);</script>
                </tr>
                <tr>
                    <td class="p-3 text-xs font-bold sticky left-0 bg-[#1e293b] border-r border-slate-700 z-10">Init ΔE</td>
                    <script>for(let i=1; i<=32; i++) document.write(`<td class="zone-cell"><input type="number" step="0.1" class="de-in" data-zone="${i}"></td>`);</script>
                </tr>
                <tr>
                    <td class="p-3 text-xs font-bold sticky left-0 bg-[#1e293b] border-r border-slate-700 z-10">Init Key%</td>
                    <script>for(let i=1; i<=32; i++) document.write(`<td class="zone-cell"><input type="number" class="key-in" data-zone="${i}" value="20"></td>`);</script>
                </tr>
                <tr class="bg-black/20">
                    <td class="p-3 text-xs font-bold sticky left-0 bg-[#1e293b] border-r border-slate-700 z-10">Result</td>
                    <script>for(let i=1; i<=32; i++) document.write(`
                        <td class="zone-cell">
                            <div class="result-box">
                                <div id="bar-${i}" class="key-bar" style="height: 0%"></div>
                                <span id="txt-${i}" class="absolute top-2 text-[10px] font-bold">--</span>
                            </div>
                        </td>`);</script>
                </tr>
            </table>
        </div>
    </div>

    <script>
        async function calculateAll() {
            const zones = [];
            const color = document.getElementById('global_color').value;
            document.querySelectorAll('.de-in').forEach(input => {
                const z = input.dataset.zone;
                const de = input.value;
                const initK = document.querySelector(`.key-in[data-zone="${z}"]`).value;
                if(de) { zones.push({ zone_no: z, de_before: de, init_key: initK, color: color, job_number: "GLOBAL", paper_type: "Coated" }); }
            });
            if(zones.length === 0) return alert("Enter some ΔE values first.");

            const res = await fetch('/predict_all', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ zones: zones }) });
            const result = await res.json();
            if(result.status === "success") {
                result.results.forEach(r => {
                    document.getElementById(`txt-${r.zone_no}`).innerText = r.predicted_key + "%";
                    document.getElementById(`bar-${r.zone_no}`).style.height = r.predicted_key + "%";
                });
            }
        }

        function clearConsole() {
            if(confirm("Clear all data and results?")) {
                document.querySelectorAll('input').forEach(i => { if(!i.classList.contains('key-in')) i.value = ""; });
                document.querySelectorAll('.key-bar').forEach(b => b.style.height = "0%");
                document.querySelectorAll('.result-box span').forEach(s => s.innerText = "--");
            }
        }

        function updateColors() {
            const color = document.getElementById('global_color').value;
            const colors = {'Cyan':'#06b6d4', 'Magenta':'#d946ef', 'Yellow':'#facc15', 'Black':'#64748b'};
            document.querySelectorAll('.key-bar').forEach(b => b.style.background = colors[color]);
        }
    </script>
</body>
</html>
